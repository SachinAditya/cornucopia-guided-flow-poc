<!DOCTYPE html>
<html>
<head>
  <title>Cornucopia Guided Flow (POC)</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 40px;
    }
    .card {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
    }
    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Start Threat Thinking</h2>

<div id="start">
  <p>What are you working on?</p>
  <select id="context">
    <option>Login System</option>
    <option>API</option>
    <option>Payment</option>
  </select>
  <br><br>
  <button onclick="startFlow()">Start</button>
</div>

<div id="card" style="display:none;">
  <div class="card">
    <h3></h3>
    <p class="card-text"></p>

    <p><b>What can go wrong?</b></p>

    <button onclick="answer('Yes')">This is a problem</button>
    <button onclick="answer('No')">Not a problem</button>
    <button onclick="answer('Review')">Not sure</button>
  </div>
</div>

<div id="result" style="display:none;">
  <h3>Your Findings</h3>
  <pre id="output"></pre>
  <button onclick="restart()">Restart</button>
</div>

<script>
  let currentCardIndex = 0;
  let answers = [];

  let cards = [
    {
      title: "Weak Authentication",
      text: "Users can try passwords multiple times without limits."
    },
    {
      title: "Session Issues",
      text: "Session tokens are not invalidated properly after logout."
    }
  ];

  function startFlow() {
    document.getElementById("start").style.display = "none";
    document.getElementById("card").style.display = "block";
    showCard();
  }

  function showCard() {
    let card = cards[currentCardIndex];

    document.querySelector(".card h3").innerText = card.title;
    document.querySelector(".card-text").innerText = card.text;
  }

  function answer(ans) {
    let context = document.getElementById("context").value;

    answers.push({
      context: context,
      card: cards[currentCardIndex].title,
      answer: ans
    });

    currentCardIndex++;

    if (currentCardIndex < cards.length) {
      showCard();
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById("card").style.display = "none";
    document.getElementById("result").style.display = "block";

    let output = "";

    answers.forEach(item => {
      output += item.context + " - " + item.card + " → " + item.answer + "\n";
    });

    document.getElementById("output").innerText = output;
  }

  function restart() {
    location.reload();
  }
</script>

</body>
</html>
